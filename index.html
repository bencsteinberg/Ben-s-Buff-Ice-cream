<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ben’s Buff Ice Cream</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f7f7ff;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      color: white;
      text-align: center;
      padding: 50px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 52px;
      font-weight: 700;
    }

    header p {
      font-size: 18px;
      margin-top: 10px;
      font-style: italic;
      opacity: 0.95;
    }

    .protein-banner {
      background: #1f2937;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 18px;
      font-weight: 500;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    .category {
      margin-bottom: 40px;
      padding: 20px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .category h2 {
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
      font-weight: 600;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 18px;
    }

    .price {
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #eee;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Ben’s Buff Ice Cream</h1>
  <p>"Ice cream without the guilt"</p>
</header>

<div class="protein-banner">
  💪 Over 20g of protein per ice cream
</div>

<div class="container">

  <div class="category">
    <h2>Starter</h2>
    <div class="item">
      <span>Vanilla</span>
      <span class="price">$3</span>
    </div>
    <div class="item">
      <span>Chocolate</span>
      <span class="price">$3</span>
    </div>
  </div>

  <div class="category">
    <h2>Upgraded</h2>
    <div class="item">
      <span>Cookies n Cream</span>
      <span class="price">$5</span>
    </div>
    <div class="item">
      <span>Peanut Butter</span>
      <span class="price">$5</span>
    </div>
  </div>

  <div class="category">
    <h2>Ultimate</h2>
    <div class="item">
      <span>Banana Bread</span>
      <span class="price">$8</span>
    </div>
    <div class="item">
      <span>Dirt</span>
      <span class="price">$8</span>
    </div>
    <div class="item">
      <span>Brownie Blast</span>
      <span class="price">$8</span>
    </div>
  </div>

</div>

<footer>
  © 2026 Ben’s Buff Ice Cream
</footer>

</body>
</html>
