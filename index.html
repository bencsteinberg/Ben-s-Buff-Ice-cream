<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ben’s Buff Ice Cream</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7ff;
      color: #222;
    }

    header {
      background: #ff6b6b;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 48px;
    }

    header p {
      font-size: 18px;
      margin-top: 10px;
      font-style: italic;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    .category {
      margin-bottom: 40px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .category h2 {
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 18px;
    }

    .price {
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #eee;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Ben’s Buff Ice Cream</h1>
  <p>"Ice cream without the guilt"</p>
</header>

<div class="container">

  <div class="category">
    <h2>Basic</h2>
    <div class="item">
      <span>Vanilla</span>
      <span class="price">$3</span>
    </div>
    <div class="item">
      <span>Chocolate</span>
      <span class="price">$3</span>
    </div>
  </div>

  <div class="category">
    <h2>Better</h2>
    <div class="item">
      <span>Cookies n Cream</span>
      <span class="price">$5</span>
    </div>
    <div class="item">
      <span>Peanut Butter</span>
      <span class="price">$5</span>
    </div>
  </div>

  <div class="category">
    <h2>Best</h2>
    <div class="item">
      <span>Banana Bread</span>
      <span class="price">$8</span>
    </div>
    <div class="item">
      <span>Dirt</span>
      <span class="price">$8</span>
    </div>
    <div class="item">
      <span>Brownie Blast</span>
      <span class="price">$8</span>
    </div>
  </div>

</div>

<footer>
  © 2026 Ben’s Buff Ice Cream
</footer>

</body>
</html>
